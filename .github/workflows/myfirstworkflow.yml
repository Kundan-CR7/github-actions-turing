name: Print Hello World
on:
  push:
jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node version
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Print Hello
        run: echo "Hello World"
      - name: Run file
        run: node index.js